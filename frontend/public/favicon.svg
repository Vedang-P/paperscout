<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="6" fill="#1a1a1a"/>
  <!-- paper document -->
  <rect x="6" y="5" width="13" height="16" rx="1.5" fill="#f5f5f0"/>
  <!-- document text lines -->
  <rect x="9" y="9.5" width="7" height="1.2" rx="0.6" fill="#1a1a1a" opacity="0.35"/>
  <rect x="9" y="12.5" width="7" height="1.2" rx="0.6" fill="#1a1a1a" opacity="0.35"/>
  <rect x="9" y="15.5" width="4.5" height="1.2" rx="0.6" fill="#1a1a1a" opacity="0.35"/>
  <!-- magnifying glass circle -->
  <circle cx="20" cy="20" r="5.5" fill="none" stroke="#f5f5f0" stroke-width="1.8"/>
  <!-- magnifying glass handle -->
  <line x1="24.2" y1="24.2" x2="27.2" y2="27.2" stroke="#f5f5f0" stroke-width="2.2" stroke-linecap="round"/>
</svg>
